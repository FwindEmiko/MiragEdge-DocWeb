name: 🐛 Bug Report
description: Report a bug to help us improve
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug 描述
        请清晰地描述遇到的问题。

  - type: textarea
    id: steps
    attributes:
      label: "🔍 复现步骤"
      placeholder: |
        1. 进入 '...'
        2. 点击 '...'
        3. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ 期望行为"
      description: 你期望会发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "❌ 实际行为"
      description: 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "🖥️ 环境信息"
      description: 请提供相关环境信息 |
        - 操作系统：Windows / macOS / Linux
        - 浏览器及版本：Chrome 120 / Firefox 121 / ...
        - 网络环境：电信 / 联通 / 移动 / BGP
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: "📸 截图或日志"
      description: 如有截图或错误日志，请粘贴在此（可选）
      placeholder: 拖拽图片到这里，或粘贴错误日志
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: "📌 补充信息"
      description: 其他你认为有用的信息（可选）
    validations:
      required: false
