name: CI/CD 持续集成

on: [push, pull_request]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: read

env:
  NODE_VERSION: 22.x
  PNPM_VERSION: 10.15.0

jobs:
  # ============================================================
  # 代码质量检查
  # ============================================================
  lint:
    name: 代码质量检查
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install
      - name: 类型检查
        run: pnpm run typecheck
        continue-on-error: false

  # ============================================================
  # 构建测试 + 打包
  # ============================================================
  test:
    name: 构建测试
    runs-on: ubuntu-22.04
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install
      - name: 构建
        run: pnpm run build
      - name: 检查构建产物大小
        run: |
          DIST_SIZE=$(du -sh .vitepress/dist | cut -f1)
          echo "📦 构建产物大小: $DIST_SIZE"
          echo "## 构建产物大小: $DIST_SIZE" >> $GITHUB_STEP_SUMMARY
      - name: 打包
        if: github.event_name == 'push'
        run: tar -czf site.tar.gz -C .vitepress/dist .
      - name: 上传构建产物
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site.tar.gz
          retention-days: 3

  # ============================================================
  # 生产部署 (ECS)
  # 仅当 push 到 main 分支时触发
  # ============================================================
  deploy:
    name: 部署
    runs-on: ubuntu-22.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: site
          path: ./
      - name: 配置 SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 远程部署
        run: |
          set -e
          HOST="dev.miragedge.top"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>&1 || echo "⚠️ ssh-keyscan 警告，继续尝试..."
          scp -o ConnectTimeout=60 site.tar.gz root@"$HOST":/tmp/
          ssh -o ConnectTimeout=60 root@"$HOST" << 'ENDSSH'
            set -e
            mkdir -p /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/
            rm -rf /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/*
            tar -xzf /tmp/site.tar.gz -C /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/
            rm /tmp/site.tar.gz
            echo "✅ 部署成功"
          ENDSSH
