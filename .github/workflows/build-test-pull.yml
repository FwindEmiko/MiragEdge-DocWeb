name: CI/CD 持续集成

on: [push, pull_request]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  actions: read

env:
  NODE_VERSION: 22.x
  PNPM_VERSION: 10.15.0

jobs:
  # ============================================================
  # 代码质量检查
  # ============================================================
  lint:
    name: 代码质量检查
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install
      - name: 类型检查
        run: pnpm run typecheck
        continue-on-error: false

  # ============================================================
  # 构建测试 + 打包
  # ============================================================
  test:
    name: 构建测试
    runs-on: ubuntu-22.04
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install
      - name: 构建
        run: pnpm run build
      - name: 检查构建产物大小
        run: |
          DIST_SIZE=$(du -sh .vitepress/dist | cut -f1)
          echo "📦 构建产物大小: $DIST_SIZE"
          echo "## 构建产物大小: $DIST_SIZE" >> $GITHUB_STEP_SUMMARY
      - name: 打包
        if: github.event_name == 'push'
        run: tar -czf site.tar.gz -C .vitepress/dist .
      - name: 上传构建产物
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site.tar.gz
          retention-days: 3

  # ============================================================
  # 部署
  # ============================================================
  deploy:
    name: 部署
    runs-on: ubuntu-22.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: site
          path: ./
      - name: 配置 SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 连接 WireGuard VPN
        run: |
          echo "=== 网络诊断 ==="
          echo "1. DNS: $(getent hosts 8.136.155.46 2>&1)"
          echo "2. TCP 443: $(timeout 5 bash -c 'echo >/dev/tcp/8.136.155.46/443' 2>&1 && echo OK || echo FAIL)"
          echo "3. UDP 51820: $(timeout 5 bash -c 'echo >/dev/udp/8.136.155.46/51820' 2>&1 && echo OK || echo FAIL)"
          echo "4. 路由表:"
          ip route show
          echo ""
          sudo apt-get update -qq && sudo apt-get install -y -qq wireguard-tools tcpdump
          echo ""
          echo "=== WG_CONFIG 内容 ==="
          echo "${{ secrets.WG_CLIENT_CONFIG }}"
          echo ""
          echo "=== 开始建立 WG 隧道 ==="
          echo "${{ secrets.WG_CLIENT_CONFIG }}" | sudo tee /etc/wireguard/github-actions.conf > /dev/null
          # 在后台抓包
          sudo tcpdump -i any -n 'udp port 51820' -c 10 &
          TCPDUMP_PID=$!
          # 循环尝试建立
          for i in $(seq 1 5); do
            echo "⏳ 尝试 $i/5..."
            sudo wg-quick up github-actions 2>&1 || true
            sleep 5
            echo "--- wg show ---"
            sudo wg show github-actions
            RX=$(sudo wg show github-actions transfer 2>/dev/null | awk '{print $2}')
            echo "RX 字节: $RX"
            if [ -n "$RX" ] && [ "$RX" -gt 0 ] 2>/dev/null; then
              echo "✅ 握手成功！"
              break
            fi
            sudo wg-quick down github-actions 2>/dev/null || true
          done
          kill $TCPDUMP_PID 2>/dev/null || true
          sleep 2
          echo "=== tcpdump 抓包输出 ==="
          # 最终检查
          if ! sudo wg show github-actions transfer 2>/dev/null | awk '{exit !($2>0)}'; then
            echo "❌ WG 隧道建立失败"
            exit 1
          fi
          echo "✅ WireGuard VPN 已就绪"

      - name: 远程部署
        run: |
          set -e
          mkdir -p ~/.ssh
          ssh-keyscan -H 20.20.20.1 >> ~/.ssh/known_hosts 2>&1 || echo "⚠️ ssh-keyscan 警告，继续尝试..."
          scp -o ConnectTimeout=60 site.tar.gz root@20.20.20.1:/tmp/
          ssh -o ConnectTimeout=60 root@20.20.20.1 << 'ENDSSH'
            set -e
            mkdir -p /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/
            rm -rf /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/*
            tar -xzf /tmp/site.tar.gz -C /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/
            rm /tmp/site.tar.gz
            echo "✅ 部署成功"
          ENDSSH

      - name: 断开 WireGuard VPN
        if: always()
        run: sudo wg-quick down github-actions 2>/dev/null || true
