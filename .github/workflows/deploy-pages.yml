name: 预览部署 (GitHub Pages)

on:
  push:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: '10.15.0'
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: pnpm install
      - name: 适配 GitHub Pages base 路径
        run: |
          python3 << 'PYEOF'
          import re
          path = '.vitepress/config.mts'
          with open(path) as f:
              c = f.read()
          c = re.sub(r"base: '/'", "base: '/MiragEdge-DocWeb/'", c)
          with open(path, 'w') as f:
              f.write(c)
          print('base updated')
          PYEOF
      - run: pnpm run build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
