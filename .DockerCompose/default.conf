# miragedge.top 的配置
server {
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_static on;

    listen 80;
    server_name miragedge.top;
    index index.html;

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK";
    }

    # 版本探测文件：前端 useVersionCheck 以 no-store 拉取，源站与 ESA 均禁止缓存
    # 这是 ESA 场景下"快速发现新部署"的关键，必须始终回源
    # ──────────────────────────────────────
    # 版本探测文件：前端 useVersionCheck 以 no-store 拉取，源站与 ESA 均禁止缓存
    location = /version.json {
        root /web_miragedge;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        expires off;
        access_log off;
        try_files $uri =404;
    }

    # 带内容 hash 的构建资源：文件名含 [hash]，内容变更 hash 必变 → 可长期 immutable
    # VitePress 产物（js/css/字体）均在此目录
    # 使用 ^~ 前缀匹配，优先级高于正则，且更高效
    location ^~ /assets/ {
        root /web_miragedge;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        access_log off;
        try_files $uri =404;
    }

    # HTML 页面：短边缘缓存 + stale-while-revalidate
    # - s-maxage=60         :ESA 边缘缓存 60s（部署后最多 60s 内全节点收敛）
    # - max-age=0           :浏览器每次向 ESA 校验（走 ETag/304，不重复下载）
    # - stale-while-revalidate=60:ESA 在回源刷新期间可返回旧副本，用户零等待
    location ~* \.html$ {
        root /web_miragedge;
        add_header Cache-Control "public, max-age=0, s-maxage=60, stale-while-revalidate=60" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        try_files $uri =404;
    }

    # 根路径与其他静态资源
    location / {
        root /web_miragedge;
        try_files $uri $uri.html $uri/ =404;
        error_page 404 /404.html;
        error_page 403 /404.html;

        # public/ 下无 hash 资源（图片/favicon/字体/manifest）：中等缓存，避免长期陈旧
        # 前端 useVersionCheck 检测到新版本时会 reload，作为兜底
        location ~* \.(?:png|jpe?g|gif|webp|ico|svg|woff2?|ttf|eot|webmanifest)$ {
            expires 1d;
            add_header Cache-Control "public, max-age=86400" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            access_log off;
            try_files $uri =404;
        }
    }

    # 安全响应头（作用于所有未在 location 内显式 add_header 的响应）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}

# f.windemiko.top 的配置（支持 PHP）
server {
    listen 88;
    server_name f.windemiko.top;
    client_max_body_size 100M;
    root /web_fwindemiko;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php8:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # 根据转发的头信息自动识别 HTTPS
        set $fastcgi_https off;
        if ($http_x_forwarded_proto = "https") {
            set $fastcgi_https on;
        }
        fastcgi_param HTTPS $fastcgi_https;

        include fastcgi_params;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 安全限制 - 禁止访问隐藏文件和敏感文件
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }

    location ~* /(\.git|wp-config\.php|readme\.html|license\.txt|install\.php) {
        deny all;
    }

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
